data_path: "data/WA_Fn-UseC_-Telco-Customer-Churn.csv"

preprocessing:
  target_column: "Churn"
  drop_columns: ["customerID"]
  encode_target: true
  missing_strategy: "mean"
  encoding: "onehot"
  scaling: "standard"
  log_transform:
    mode: "auto"
    skew_threshold: 0.75
    columns: []
  outliers:
    handle: "remove"
    multiplier: 1.5
    columns: []

split:
  test_size: 0.2
  random_state: 42
  stratify: false

training:
  target_column: "Churn"
  models:
    - name: "logistic_regression"
      type: "logistic_regression"
      hyperparameters: {max_iter: 1000, class_weight: "balanced"}
    - name: "random_forest"
      type: "random_forest"
      hyperparameters: {n_estimators: 200, max_depth: 10, class_weight: "balanced"}
    - name: "gradient_boosting"
      type: "gradient_boosting"
      hyperparameters: {n_estimators: 200}
    # - name: "extra_trees"
    #   type: "extra_trees"
    #   hyperparameters: {n_estimators: 100, class_weight: "balanced"}

  artifacts_dir: "artifacts"
